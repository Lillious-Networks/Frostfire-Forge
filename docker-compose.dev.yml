services:
  gateway-dev:
    build:
      context: ./Frostfire-Forge-Gateway
      dockerfile: Dockerfile
      args:
        HTTP_PORT: ${HTTP_PORT:-9999}
        HTTPS_PORT: ${HTTPS_PORT:-443}
        WS_PORT: ${WS_PORT:-9000}
    container_name: frostfire-gateway-dev
    restart: unless-stopped
    ports:
      - "9999:9999"
      - "9000:9000"
    env_file:
      - ./Frostfire-Forge-Gateway/.env.gateway
    environment:
      - GATEWAY_AUTH_KEY=${GATEWAY_AUTH_KEY}
    volumes:
      - ./Frostfire-Forge-Gateway/config.json:/app/config.json:ro
    networks:
      - frostfire-network-dev

  frostfire-forge-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: frostfire-forge-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "3001:3001"
    volumes:
      - ./.env.development:/app/.env.development:ro
    env_file:
      - .env.development
    networks:
      - frostfire-network-dev
    depends_on:
      #- redis-dev
      - gateway-dev

  # redis-dev:
