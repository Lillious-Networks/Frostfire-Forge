name: Development > Release

permissions:
  contents: read

on:
  push:
    paths:
      - 'src/**'
      - 'docker-compose.dev.yml'
      - 'Dockerfile.dev'
      - '.github/workflows/development_release.yml'
    branches:
      - development

  workflow_dispatch:

concurrency:
  group: 'development-release'
  cancel-in-progress: true

jobs:
  build:
    name: Build Development
    runs-on: self-hosted
    environment: development
    steps:
      - name: Cleanup Docker Resources Before Build
        continue-on-error: true
        run: |
          echo "Cleaning up Docker resources before build..."
          # Remove dangling images
          docker image prune -f || true
          # Remove all build cache
          docker builder prune -f -a || true
          # Remove all unused images (not just dangling)
          docker image prune -a -f || true
          # Remove stopped containers
          docker container prune -f || true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update environment variables
        run: |
          # Check if .env.development is a directory (should not be)
          if [ -d ".env.development" ]; then
            echo ".env.development is a directory. Removing it."
            rm -rf .env.development
          fi

          # Remove existing .env.development file if it exists and is not a directory
          if [ -f ".env.development" ]; then
            echo ".env.development file exists. Removing it."
            rm .env.development
          fi

          # Create game engine .env.development
          echo 'DATABASE_ENGINE=mysql' >> .env.development
          echo 'DATABASE_HOST="${{ secrets.DATABASE_HOST }}"' >> .env.development
          echo 'DATABASE_NAME="${{ secrets.DATABASE_NAME }}"' >> .env.development
          echo 'DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}"' >> .env.development
          echo 'DATABASE_USER="${{ secrets.DATABASE_USER }}"' >> .env.development
          echo 'DATABASE_PORT="${{ secrets.DATABASE_PORT }}"' >> .env.development
          echo 'SESSION_KEY=""' >> .env.development
          echo 'SQL_SSL_MODE=DISABLED' >> .env.development
          echo 'WEBSRV_PORT=8000' >> .env.development
          echo 'WEBSRV_PORTSSL=443' >> .env.development
          echo 'WEBSRV_USESSL=false' >> .env.development
          echo 'TRANSLATION_SERVICE="none"' >> .env.development
          echo 'WEB_SOCKET_URL="ws://gateway.lillious.com"' >> .env.development
          echo 'WEB_SOCKET_PORT=3001' >> .env.development
          echo 'GATEWAY_WS_PORT=9000' >> .env.development
          echo 'DOMAIN="http://forge.lillious.com:8000"' >> .env.development
          echo 'GATEWAY_URL="http://gateway.lillious.com:9999"' >> .env.development
          echo 'GATEWAY_ENABLED=true' >> .env.development
          echo 'GAME_NAME="Frostfire Forge Beta"' >> .env.development
          echo 'CACHE="memory"' >> .env.development
          echo 'VERSION="${{ github.run_number }}-development"' >> .env.development
          echo 'SERVER_HOST="frostfire-forge-dev"' >> .env.development
          echo 'PUBLIC_HOST="development.lillious.com"' >> .env.development
          echo 'GATEWAY_AUTH_KEY="${{ secrets.GATEWAY_AUTH_KEY }}"' >> .env.development

      - name: Build Docker Image
        run: |
          docker compose -f docker-compose.dev.yml build

  backup-docker-images:
    name: Backup Current Docker Images
    runs-on: self-hosted
    environment: development
    needs: [build]
    steps:
      - name: Tag current images as backup
        continue-on-error: true
        run: |
          # Get list of running containers and their images
          RUNNING_IMAGES=$(docker compose -f docker-compose.dev.yml ps --format json 2>/dev/null | jq -r '.Image' 2>/dev/null || echo "")

          if [ -z "$RUNNING_IMAGES" ]; then
            echo "No running containers found, checking for existing images..."
            # Try to get images from docker-compose config
            IMAGES=$(docker compose -f docker-compose.dev.yml config 2>/dev/null | grep 'image:' | awk '{print $2}' || echo "")

            if [ -z "$IMAGES" ]; then
              echo "No images found to backup, skipping..."
              exit 0
            fi
            RUNNING_IMAGES="$IMAGES"
          fi

          echo "Backing up current Docker images..."
          # Remove duplicates and filter out SHA256 hashes
          UNIQUE_IMAGES=$(echo "$RUNNING_IMAGES" | sort -u | grep -v "^sha256:" | grep -v "^$")

          if [ -z "$UNIQUE_IMAGES" ]; then
            echo "No valid images to backup"
            exit 0
          fi

          while IFS= read -r image; do
            if [ -n "$image" ] && [ "$image" != "sha256:"* ]; then
              # Check if image exists before tagging
              if docker image inspect "$image" >/dev/null 2>&1; then
                echo "Tagging $image as ${image}-backup"
                docker tag "$image" "${image}-backup" || echo "Failed to tag $image"
              else
                echo "Image $image does not exist, skipping..."
              fi
            fi
          done <<< "$UNIQUE_IMAGES"

  stop-docker-container:
    name: Stop Docker Container
    runs-on: self-hosted
    environment: development
    needs: [backup-docker-images]
    steps:
      - name: Stop Docker Container
        run: |
          docker compose -f docker-compose.dev.yml down || echo "No container to stop"

  start-docker-container:
    name: Start Docker Container
    runs-on: self-hosted
    environment: development
    needs: [stop-docker-container]
    steps:
      - name: Start Docker Services
        run: |
          docker compose -f docker-compose.dev.yml up -d

  verify-docker-container:
    name: Verify Docker Container is Running
    runs-on: self-hosted
    environment: development
    needs: [start-docker-container]
    outputs:
      status: ${{ steps.verify.outcome }}
    steps:
      - name: Wait for services and check logs
        id: verify
        continue-on-error: true
        run: |
          echo "Waiting 20 seconds for services to start..."
          sleep 20

          echo "=== Docker Container Status ==="
          docker compose -f docker-compose.dev.yml ps

          echo ""
          echo "=== Game Server Logs ==="
          docker compose -f docker-compose.dev.yml logs frostfire-forge-dev --tail=100

          echo ""
          echo "=== Redis Logs ==="
          docker compose -f docker-compose.dev.yml logs redis-dev --tail=50

          echo ""
          echo "=== Checking for success indicators ==="
          LOGS=$(docker compose -f docker-compose.dev.yml logs)

          if echo "$LOGS" | grep -qi "webserver started\|server.*running\|listening.*8000\|HTTP Server running"; then
            echo "✅ Services started successfully"
            exit 0
          else
            echo "❌ Services did NOT start properly"
            echo "Check logs above for errors"
            exit 1
          fi

      - name: Check verification result
        if: steps.verify.outcome == 'failure'
        run: |
          echo "Verification failed, triggering rollback..."
          exit 1

  rollback:
    name: Rollback to Previous Docker Images
    runs-on: self-hosted
    environment: development
    needs: [verify-docker-container]
    if: failure() && needs.verify-docker-container.outputs.status == 'failure'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stop failed containers
        run: |
          echo "Stopping failed Docker containers..."
          docker compose -f docker-compose.dev.yml down || echo "No containers to stop"

      - name: Restore backup images
        run: |
          echo "Restoring backup Docker images..."

          # Find all backup images
          BACKUP_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -- "-backup$" || echo "")

          if [ -n "$BACKUP_IMAGES" ]; then
            while IFS= read -r backup_image; do
              if [ -n "$backup_image" ]; then
                # Remove -backup suffix to get original image name
                original_image="${backup_image%-backup}"
                echo "Restoring $backup_image to $original_image"

                # Force remove the new (failed) image if it exists
                docker rmi -f "$original_image" 2>/dev/null || echo "No new image to remove"

                # Re-tag backup image to original name
                docker tag "$backup_image" "$original_image"
              fi
            done <<< "$BACKUP_IMAGES"
          else
            echo "No backup images found to restore"
            exit 1
          fi

          # Clean up failed build artifacts
          echo "Cleaning up failed build artifacts..."
          docker image prune -f || true
          docker builder prune -f || true

      - name: Start containers with backup images
        run: |
          echo "Starting Docker containers with backup images..."
          docker compose -f docker-compose.dev.yml up -d

      - name: Verify rollback
        run: |
          echo "Waiting 20 seconds for services to start..."
          sleep 20

          echo "=== Docker Container Status ==="
          docker compose -f docker-compose.dev.yml ps

          echo ""
          echo "=== Fetching Docker logs ==="
          LOGS=$(docker compose -f docker-compose.dev.yml logs --tail=100)

          echo "$LOGS"

          if echo "$LOGS" | grep -qi "webserver started\|server.*running\|listening.*8000\|HTTP Server running"; then
            echo "✅ Rollback successful - Previous version is running"
          else
            echo "❌ Rollback failed - Manual intervention required"
            exit 1
          fi

  cleanup-failed:
    name: Cleanup Failed Build Artifacts
    runs-on: self-hosted
    environment: development
    needs: [verify-docker-container]
    if: failure()
    steps:
      - name: Remove Failed Build Artifacts
        continue-on-error: true
        run: |
          echo "Cleaning up failed build artifacts..."
          docker image prune -a -f || true
          docker builder prune -f -a || true
          docker container prune -f || true

  cleanup:
    name: Cleanup Old Docker Images
    runs-on: self-hosted
    environment: development
    needs: [start-docker-container, verify-docker-container]
    if: success() && needs.verify-docker-container.outputs.status == 'success'
    steps:
      - name: Remove Backup and Unused Docker Images
        run: |
          echo "Removing backup Docker images..."
          # Remove all backup images
          BACKUP_IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -- "-backup$" || echo "")

          if [ -n "$BACKUP_IMAGES" ]; then
            while IFS= read -r backup_image; do
              if [ -n "$backup_image" ]; then
                echo "Removing backup image: $backup_image"
                docker rmi "$backup_image" || echo "Failed to remove $backup_image"
              fi
            done <<< "$BACKUP_IMAGES"
          else
            echo "No backup images found"
          fi

          echo "Removing all unused Docker images and build cache..."
          docker image prune -a -f || true
          docker builder prune -f -a || true
          docker container prune -f || true
          docker volume prune -f || true