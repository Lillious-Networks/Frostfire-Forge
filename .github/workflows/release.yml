name: Release Pipeline

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lockb'
      - 'Dockerfile.*'
      - 'docker-compose*.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run without creating release'
        required: false
        default: 'false'

concurrency:
  group: 'release-pipeline-${{ github.ref }}'
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify Environment Configuration
        run: |
          if [ ! -f "package.json" ]; then
            echo "❌ package.json not found"
            exit 1
          fi
          if [ ! -f "src/socket/server.ts" ]; then
            echo "❌ Game server entry point not found"
            exit 1
          fi
          echo "✅ Configuration validation passed"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify Config Generation
        run: |
          bun create-config --environment local
          if [ ! -f "src/config/assets.json" ]; then
            echo "❌ Config generation failed: assets.json not created"
            exit 1
          fi
          if [ ! -f "src/config/settings.json" ]; then
            echo "❌ Config generation failed: settings.json not created"
            exit 1
          fi
          if [ ! -f "src/config/aoi.json" ]; then
            echo "❌ Config generation failed: aoi.json not created"
            exit 1
          fi
          echo "✅ All config files generated successfully"

      - name: Verify Swears Configuration
        run: |
          if [ ! -f "src/utility/swears.json" ]; then
            echo "❌ Swears filter not found"
            exit 1
          fi
          if ! jq empty "src/utility/swears.json" 2>/dev/null; then
            echo "❌ Swears filter is not valid JSON"
            exit 1
          fi
          echo "✅ Swears filter validation passed"

  build-development:
    name: Build Development Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push Development Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/docker/Dockerfile.dev
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frostfire-forge-dev:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frostfire-forge-dev:latest

  test-integration:
    name: Test Gateway and Game Server Integration
    runs-on: ubuntu-latest
    needs: [build-development]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Checkout Gateway Repository
        uses: actions/checkout@v6
        with:
          repository: Lillious-Networks/Frostfire-Forge-Gateway
          path: gateway

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Start Gateway with Docker Compose
        run: docker compose -p gateway -f gateway/src/docker/docker-compose.dev.yml up -d && sleep 10

      - name: Start Game Server with Docker Compose
        env:
          GAME_SERVER_IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frostfire-forge-dev:latest
        run: docker compose -p gateway -f src/docker/docker-compose.dev.yml up -d && sleep 10

      - name: Verify Game Server Registration with Gateway
        run: |
          echo "Checking if game server registered with gateway..."
          RETRIES=0
          MAX_RETRIES=10
          while [ $RETRIES -lt $MAX_RETRIES ]; do
            if curl -s http://localhost/api/servers | grep -q "game-server"; then
              echo "✅ Game server successfully registered with gateway"
              exit 0
            fi
            RETRIES=$((RETRIES + 1))
            echo "Attempt $RETRIES/$MAX_RETRIES: Waiting for registration..."
            sleep 2
          done
          echo "❌ Game server failed to register with gateway"
          docker compose -p gateway -f gateway/src/docker/docker-compose.dev.yml logs
          docker compose -p gateway -f src/docker/docker-compose.dev.yml logs
          exit 1

      - name: Test Gateway to Game Server Connection
        run: |
          echo "Testing gateway can reach game server..."
          RESPONSE=$(curl -s http://localhost/api/servers)
          if echo "$RESPONSE" | jq . > /dev/null 2>&1; then
            echo "✅ Gateway responding with server list"
            echo "Server list:"
            echo "$RESPONSE" | jq .
          else
            echo "❌ Gateway connection failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        env:
          GAME_SERVER_IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frostfire-forge-dev:latest
        run: |
          docker compose -p gateway -f src/docker/docker-compose.dev.yml down
          docker compose -p gateway -f gateway/src/docker/docker-compose.dev.yml down

  notify-completion:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: [test-integration]
    if: always()
    steps:
      - name: Notify Pipeline Complete
        run: |
          INTEGRATION_STATUS="${{ needs.test-integration.result }}"

          if [ "$INTEGRATION_STATUS" = "success" ]; then
            echo "✅ Gateway and Game Server Integration Tests Passed"
            echo "✅ Development Pipeline Complete"
            echo "🐳 Development Docker image published to GHCR"
          else
            echo "⚠️  Integration tests did not complete successfully"
          fi
