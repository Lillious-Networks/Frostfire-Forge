services:
  frostfire-forge:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: frostfire-forge-prod
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # Ports NOT exposed - only accessible through gateway
    # ports:
    #   - "8080:8080"
    #   - "3001:3001"
    volumes:
      - ./.env.production:/app/.env.production:ro
    env_file:
      - .env.production
    networks:
      - frostfire-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: frostfire-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - frostfire-network

volumes:
  redis-data:

networks:
  frostfire-network:
    driver: bridge