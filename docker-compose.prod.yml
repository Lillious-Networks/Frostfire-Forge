services:
  gateway-prod:
    build:
      context: ./Frostfire-Forge-Gateway
      dockerfile: Dockerfile
      args:
        HTTP_PORT: ${HTTP_PORT:-80}
        HTTPS_PORT: ${HTTPS_PORT:-443}
        WS_PORT: ${WS_PORT:-3000}
    container_name: frostfire-gateway-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"
    env_file:
      - ./Frostfire-Forge-Gateway/.env.gateway
    environment:
      - GATEWAY_AUTH_KEY=${GATEWAY_AUTH_KEY}
    volumes:
      - ./Frostfire-Forge-Gateway/config.json:/app/config.json:ro
    networks:
      - frostfire-network

  frostfire-forge:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: frostfire-forge-prod
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # Ports NOT exposed - only accessible through gateway
    # ports:
    #   - "8080:8080"
    #   - "3001:3001"
    volumes:
      - ./.env.production:/app/.env.production:ro
    env_file:
      - .env.production
    networks:
      - frostfire-network
    depends_on:
      - redis
      - gateway-prod

  redis:
    image: redis:7-alpine
    container_name: frostfire-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - frostfire-network

volumes:
  redis-data:

networks:
  frostfire-network:
    driver: bridge