services:
  frostfire-forge-local:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile.local
    container_name: frostfire-forge-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./.env.local:/app/.env.local:ro
    env_file:
      - .env.local
    networks:
      - frostfire-network-local

networks:
  frostfire-network-local:
    driver: bridge
