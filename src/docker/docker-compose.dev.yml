services:
  frostfire-forge-dev:
    build:
      context: ../../
      dockerfile: src/docker/Dockerfile.dev
    container_name: frostfire-forge-dev
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: mysql-dev
      DATABASE_PORT: 3306
    volumes:
      - ../../.env.development:/app/.env.development:ro
    env_file:
      - ../../.env.development
    networks:
      - frostfire-network-dev

networks:
  frostfire-network-dev:
    driver: bridge
