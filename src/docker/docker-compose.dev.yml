services:
  frostfire-forge-dev:
    build:
      context: ../..
      dockerfile: src/docker/Dockerfile.dev
    container_name: frostfire-forge-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./.env.development:/app/.env.development:ro
    env_file:
      - .env.development
    networks:
      - frostfire-network-dev

networks:
  frostfire-network-dev:
    driver: bridge
